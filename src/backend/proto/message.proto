syntax = "proto3";
package message;

service Message {
  rpc SendMessage(SendMessageRequest) returns (SendMessageReply);
  rpc ListMessagesBySession(ListMessagesBySessionRequest) returns (ListMessagesBySessionReply);
  rpc SubscribeSessionMessages(SubscribeSessionMessagesRequest) returns (stream SubscribeSessionMessagesReply);
}

message MessageModel {
  string id = 1;
  string harness_message_id = 2;
  string session_id = 3;
  string parent_message_id = 4;
  string role = 5;
  string body = 6;
  bool is_finished_streaming = 7;
  bool is_summary = 8;
  string model_id = 9;
  string provider_id = 10;
  string error_name = 11;
  string error_message = 12;
  string error_type = 13;
  string cwd = 14;
  string root = 15;
  double cost = 16;
  int64 input_tokens = 17;
  int64 output_tokens = 18;
  int64 reasoning_tokens = 19;
  int64 cached_read_tokens = 20;
  int64 cached_write_tokens = 21;
  int64 total_tokens = 22;
  string completed_at = 23;
  string created_at = 24;
  string updated_at = 25;
}

message MessagePartModel {
  string id = 1;
  string harness_part_id = 2;
  string session_id = 3;
  string message_id = 4;
  int64 position = 5;
  string part_type = 6;
  string text_content = 7;
  bool synthetic = 8;
  bool ignored = 9;
  string call_id = 10;
  string tool_name = 11;
  string tool_status = 12;
  string tool_title = 13;
  string tool_output_text = 14;
  string tool_error_text = 15;
  string created_at = 16;
  string updated_at = 17;
}

message MessageWithParts {
  MessageModel message = 1;
  repeated MessagePartModel parts = 2;
}

message SendMessageRequest {
  string session_id = 1;
  string text = 2;
  string agent = 3;
  string system = 4;
  string provider_id = 5;
  string model_id = 6;
}

message SendMessageReply {
  string session_id = 1;
  string user_message_id = 2;
}

message ListMessagesBySessionRequest {
  string session_id = 1;
}

message ListMessagesBySessionReply {
  repeated MessageWithParts messages = 1;
}

message SubscribeSessionMessagesRequest {
  string session_id = 1;
}

message MessageUpserted {
  MessageModel message = 1;
}

message MessagePartUpserted {
  MessagePartModel part = 1;
  bool has_delta = 2;
  string delta = 3;
}

message MessageRemoved {
  string session_id = 1;
  string harness_message_id = 2;
}

message SessionIdle {
  string session_id = 1;
}

message SubscribeSessionMessagesReply {
  oneof payload {
    MessageUpserted message_upserted = 1;
    MessagePartUpserted message_part_upserted = 2;
    MessageRemoved message_removed = 3;
    SessionIdle session_idle = 4;
  }
}
